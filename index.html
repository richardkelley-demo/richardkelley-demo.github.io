<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Richard Kelley | GitHub Pages</title>
  <meta name="description" content="Personal GitHub Pages site for Richard Kelley.">
  <style>
    :root {
      --bg1: #f7f2e8;
      --bg2: #e4efe7;
      --ink: #1f2933;
      --accent: #d9480f;
      --card: rgba(255, 255, 255, 0.72);
      --border: rgba(31, 41, 51, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 20%, #ffe8cc 0, transparent 40%),
        radial-gradient(circle at 85% 10%, #d3f9d8 0, transparent 45%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      padding: 40px 32px;
      border: 1px solid var(--border);
      background: var(--card);
      backdrop-filter: blur(4px);
      border-radius: 16px;
      box-shadow: 0 18px 40px rgba(31, 41, 51, 0.12);
      animation: rise 700ms ease-out both;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0;
      font-size: clamp(1rem, 2.2vw, 1.2rem);
      line-height: 1.55;
      max-width: 58ch;
    }

    .tag {
      display: inline-block;
      margin-bottom: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(217, 72, 15, 0.12);
      color: var(--accent);
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="tag">Live on GitHub Pages</span>
    <h1>Richard Kelley</h1>
    <p>
      This site is deployed from the <code>main</code> branch of
      <code>richardkelley-demo.github.io</code>. Push updates to this repository,
      and GitHub Pages will publish them automatically.
    </p>
  </main>
</body>
</html>
